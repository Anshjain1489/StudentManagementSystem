# ============================================================
# Student Management System - Production Configuration (Supabase PostgreSQL)
# ============================================================

# Database Configuration (Supabase Connection Pooler / Transaction Mode)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Hikari Connection Pool Tuning for Serverless Supabase limits
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:4}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000

# Cache Configuration
spring.cache.type=simple

# Production Logging Levels
logging.level.in.springproject=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.file.name=logs/sms-production.log

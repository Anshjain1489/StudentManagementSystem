# ============================================================
# Student Management System - Production Configuration (Supabase PostgreSQL)
# ============================================================

# Server Configuration - CRITICAL: Must bind to 0.0.0.0 for Render to detect the port
server.address=0.0.0.0
server.port=${PORT:8080}

# Database Configuration (Supabase Connection Pooler / Transaction Mode)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Hikari Connection Pool Tuning for Serverless Supabase limits
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:4}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:1}
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000

# Cache Configuration
spring.cache.type=simple

# Spring Main Configuration
# CRITICAL: lazy-initialization=true makes Tomcat bind to port in ~10s
# Without it, eager Hibernate+Supabase init takes 170s and Render's port scanner misses it
spring.main.lazy-initialization=true
spring.data.jpa.repositories.bootstrap-mode=lazy

# Thymeleaf Configuration
spring.thymeleaf.check-template-location=false

# Production Logging Levels
logging.level.in.springproject=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.file.name=logs/sms-production.log

# ============================================================
# Student Management System - Development Configuration (Local MySQL / H2)
# ============================================================

# Server Port
server.port=8081

# Database Configuration (Local MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/sms_db_dev?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=rootpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Development Logging Levels
logging.level.in.springproject=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# Enable Mocking/Stub OpenRouter key for local testing
app.ai.openrouter.api-key=dev-mock-key

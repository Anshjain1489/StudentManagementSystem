# ============================================================
# Student Management System - Application Properties
# ============================================================

spring.application.name=StudentManagementSystem
server.port=8080
server.servlet.context-path=/

# ============================================================
# Database Configuration
# ============================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sms_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:148912}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.pool-name=SMSHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ============================================================
# JWT Configuration
# ============================================================
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.access-token-expiration=86400000
app.jwt.refresh-token-expiration=604800000

# ============================================================
# File Upload / Storage Configuration
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=25MB

app.storage.type=${STORAGE_TYPE:local}
app.storage.local.base-path=${STORAGE_PATH:./uploads}
app.storage.allowed-extensions=jpg,jpeg,png,gif,pdf,doc,docx,xls,xlsx

# ============================================================
# Email Configuration (SMTP)
# ============================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.mail.from=${MAIL_FROM:noreply@sms.edu}
app.mail.from-name=Student Management System

# ============================================================
# OpenRouter AI Configuration
# ============================================================
app.ai.openrouter.api-key=${OPENROUTER_API_KEY:your-openrouter-api-key}
app.ai.openrouter.base-url=https://openrouter.ai/api/v1
app.ai.openrouter.model=${AI_MODEL:mistralai/mistral-7b-instruct:free}
app.ai.openrouter.max-tokens=2048
app.ai.openrouter.temperature=0.7

# ============================================================
# Cache Configuration
# ============================================================
spring.cache.type=simple

# ============================================================
# Actuator Configuration
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.mail.enabled=false
management.info.env.enabled=true
info.app.name=Student Management System
info.app.version=1.0.0
info.app.description=Enterprise-grade SMS for colleges and universities

# ============================================================
# Swagger / OpenAPI Configuration
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.display-request-duration=true

# ============================================================
# CORS Configuration
# ============================================================
app.cors.allowed-origins=${CORS_ORIGINS:https://student-management-system-fawn-three.vercel.app,http://localhost:3000,http://localhost:5173}
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.max-age=3600

# ============================================================
# Application-Specific Config
# ============================================================
app.name=Student Management System
app.version=1.0.0
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# Default admin seed user
app.admin.email=${ADMIN_EMAIL:admin@sms.edu}
app.admin.password=${ADMIN_PASSWORD:Admin@123}
app.admin.firstName=System
app.admin.lastName=Administrator

# ============================================================
# Logging Configuration
# ============================================================
logging.level.in.springproject=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/sms-application.log
logging.file.max-size=10MB
logging.file.max-history=30

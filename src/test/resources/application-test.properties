# Test profile using H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable mail for tests
spring.mail.host=localhost
spring.mail.port=3025

# JWT for tests
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.access-token-expiration=3600000
app.jwt.refresh-token-expiration=86400000

# Disable local storage directory for testing
app.storage.local.base-path=./target/uploads-test
app.base-url=http://localhost:8080
app.frontend-url=http://localhost:3000

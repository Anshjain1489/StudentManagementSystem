name: Student Management System CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify no UTF-8 BOM in Java sources
        run: |
          BOMFILES=$(grep -rl $'\xef\xbb\xbf' src/ 2>/dev/null || true)
          if [ -n "$BOMFILES" ]; then
            echo "ERROR: BOM detected in the following files:"
            echo "$BOMFILES"
            sed -i '1s/^\xef\xbb\xbf//' $BOMFILES
            echo "BOM stripped by CI. Files corrected:"
            echo "$BOMFILES"
          else
            echo "No BOM detected in source files."
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Run Backend Tests
        run: |
          mvn clean test -B

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Build Frontend for Production
        run: |
          cd frontend
          npm ci
          npm run build

  deploy-check:
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Log Deployment Check
        run: |
          echo "CI checks passed. Repository is ready for automated webhook deployment to Render and Vercel."
